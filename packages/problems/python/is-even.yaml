slug: is-even
name: Is even
language: python
difficulty: 1
track: python-fundamentals
concept_tags:
  - control-flow
  - modulo
expected_median_time_to_solve_ms: 45000
statement: |
  Write `solve(n)` that returns `True` if the integer `n` is even, `False` otherwise.
  Note that `0` is considered even.
starter_code: |
  def solve(n):
      pass
reference_solution: |
  def solve(n):
      return n % 2 == 0
public_examples:
  - input: 4
    expected: true
  - input: 7
    expected: false
hidden_tests:
  - input: 0
    expected: true
  - input: -2
    expected: true
  - input: -3
    expected: false
  - input: 1000000
    expected: true
  - input: 1
    expected: false
