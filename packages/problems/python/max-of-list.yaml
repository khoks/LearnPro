slug: max-of-list
name: Maximum of a list
language: python
difficulty: 2
track: python-fundamentals
concept_tags:
  - lists
  - control-flow
expected_median_time_to_solve_ms: 90000
statement: |
  Write `solve(nums)` that returns the maximum value in the list `nums`.
  You may assume `nums` is non-empty.
starter_code: |
  def solve(nums):
      pass
reference_solution: |
  def solve(nums):
      best = nums[0]
      for n in nums[1:]:
          if n > best:
              best = n
      return best
public_examples:
  - input: [[1, 2, 3]]
    expected: 3
  - input: [[-5, -1, -10]]
    expected: -1
hidden_tests:
  - input: [[42]]
    expected: 42
  - input: [[5, 5, 5]]
    expected: 5
  - input: [[100, 50, 200, 75]]
    expected: 200
  - input: [[-1, -2, -3, -4]]
    expected: -1
  - input: [[0, 0, 1]]
    expected: 1
