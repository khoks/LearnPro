slug: binary-search
name: Binary search
language: python
difficulty: 3
track: python-fundamentals
concept_tags:
  - lists
  - control-flow
  - algorithms
expected_median_time_to_solve_ms: 300000
statement: |
  Write `solve(nums, target)` that returns the index of `target` in the sorted list
  `nums` using binary search, or `-1` if the target is not found. Do not use
  `nums.index()`.
starter_code: |
  def solve(nums, target):
      pass
reference_solution: |
  def solve(nums, target):
      lo, hi = 0, len(nums) - 1
      while lo <= hi:
          mid = (lo + hi) // 2
          if nums[mid] == target:
              return mid
          if nums[mid] < target:
              lo = mid + 1
          else:
              hi = mid - 1
      return -1
public_examples:
  - input: [[1, 3, 5, 7, 9], 5]
    expected: 2
  - input: [[1, 3, 5, 7, 9], 4]
    expected: -1
hidden_tests:
  - input: [[], 5]
    expected: -1
  - input: [[1], 1]
    expected: 0
  - input: [[1], 2]
    expected: -1
  - input: [[1, 2, 3, 4, 5], 1]
    expected: 0
  - input: [[1, 2, 3, 4, 5], 5]
    expected: 4
  - input: [[-10, -5, 0, 5, 10], 0]
    expected: 2
  - input: [[1, 1, 1, 1], 1]
    expected: 1
