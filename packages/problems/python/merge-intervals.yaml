slug: merge-intervals
name: Merge intervals
language: python
difficulty: 4
track: python-fundamentals
concept_tags:
  - lists
  - sorting
  - control-flow
expected_median_time_to_solve_ms: 480000
statement: |
  Given a list of `[start, end]` intervals, return a new list of merged
  intervals where any overlapping or touching intervals are combined. Touching
  intervals (e.g. `[1, 3]` and `[3, 5]`) should be merged into `[1, 5]`.
  The output must be sorted by `start`.
starter_code: |
  def solve(intervals):
      pass
reference_solution: |
  def solve(intervals):
      if not intervals:
          return []
      ordered = sorted(intervals, key=lambda x: x[0])
      out = [list(ordered[0])]
      for lo, hi in ordered[1:]:
          if lo <= out[-1][1]:
              out[-1][1] = max(out[-1][1], hi)
          else:
              out.append([lo, hi])
      return out
public_examples:
  - input: [[[1, 3], [2, 6], [8, 10]]]
    expected: [[1, 6], [8, 10]]
  - input: [[[1, 4], [4, 5]]]
    expected: [[1, 5]]
hidden_tests:
  - input: [[]]
    expected: []
  - input: [[[1, 5]]]
    expected: [[1, 5]]
  - input: [[[1, 4], [2, 3]]]
    expected: [[1, 4]]
  - input: [[[5, 6], [1, 2], [3, 4]]]
    expected: [[1, 2], [3, 4], [5, 6]]
  - input: [[[1, 10], [2, 3], [4, 5], [6, 7]]]
    expected: [[1, 10]]
  - input: [[[1, 2], [3, 4], [5, 6]]]
    expected: [[1, 2], [3, 4], [5, 6]]
