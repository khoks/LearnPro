slug: squares-evens
name: Squares of even numbers
language: python
difficulty: 3
track: python-fundamentals
concept_tags:
  - lists
  - list-comprehension
  - modulo
expected_median_time_to_solve_ms: 150000
statement: |
  Write `solve(nums)` that returns a list of the squares of the even numbers
  in `nums`, preserving order. Use a list comprehension.
starter_code: |
  def solve(nums):
      pass
reference_solution: |
  def solve(nums):
      return [x * x for x in nums if x % 2 == 0]
public_examples:
  - input: [[1, 2, 3, 4]]
    expected: [4, 16]
  - input: [[1, 3, 5]]
    expected: []
hidden_tests:
  - input: [[]]
    expected: []
  - input: [[2]]
    expected: [4]
  - input: [[0]]
    expected: [0]
  - input: [[-2, -1, 0, 1, 2]]
    expected: [4, 0, 4]
  - input: [[10, 20, 30]]
    expected: [100, 400, 900]
