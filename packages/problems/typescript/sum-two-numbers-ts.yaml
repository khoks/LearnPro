slug: sum-two-numbers-ts
name: Sum two numbers (TypeScript)
language: typescript
difficulty: 1
track: typescript-fundamentals
concept_tags:
  - numbers
  - arithmetic
expected_median_time_to_solve_ms: 30000
statement: |
  Write a function `solve(a: number, b: number): number` that returns the sum
  of `a` and `b`.
starter_code: |
  function solve(a: number, b: number): number {
      // TODO
      return 0;
  }
reference_solution: |
  function solve(a: number, b: number): number {
      return a + b;
  }
public_examples:
  - input: [2, 3]
    expected: 5
  - input: [-1, 1]
    expected: 0
hidden_tests:
  - input: [0, 0]
    expected: 0
  - input: [100, 200]
    expected: 300
  - input: [-50, -50]
    expected: -100
  - input: [1000000, 1]
    expected: 1000001
  - input: [-7, 7]
    expected: 0
