slug: fizzbuzz-ts
name: FizzBuzz (TypeScript)
language: typescript
difficulty: 2
track: typescript-fundamentals
concept_tags:
  - control-flow
  - modulo
  - arrays
expected_median_time_to_solve_ms: 90000
statement: |
  Write `solve(n: number): string[]` that returns an array of `n` strings
  for the FizzBuzz sequence from 1 to `n`:
  - "Fizz" if the index is divisible by 3
  - "Buzz" if the index is divisible by 5
  - "FizzBuzz" if divisible by both
  - Otherwise the number as a string
starter_code: |
  function solve(n: number): string[] {
      // TODO
      return [];
  }
reference_solution: |
  function solve(n: number): string[] {
      const out: string[] = [];
      for (let i = 1; i <= n; i++) {
          if (i % 15 === 0) out.push("FizzBuzz");
          else if (i % 3 === 0) out.push("Fizz");
          else if (i % 5 === 0) out.push("Buzz");
          else out.push(String(i));
      }
      return out;
  }
public_examples:
  - input: 5
    expected: ["1", "2", "Fizz", "4", "Buzz"]
  - input: 3
    expected: ["1", "2", "Fizz"]
hidden_tests:
  - input: 0
    expected: []
  - input: 1
    expected: ["1"]
  - input: 15
    expected: ["1", "2", "Fizz", "4", "Buzz", "Fizz", "7", "8", "Fizz", "Buzz", "11", "Fizz", "13", "14", "FizzBuzz"]
  - input: 6
    expected: ["1", "2", "Fizz", "4", "Buzz", "Fizz"]
  - input: 10
    expected: ["1", "2", "Fizz", "4", "Buzz", "Fizz", "7", "8", "Fizz", "Buzz"]
