statement: |
  Given a discriminated union `Shape` with `kind: "circle" | "square" |
  "rectangle"`, write `solve(shape: Shape): number` that returns the area:

  - `circle` has a `radius: number` — area is `Math.PI * radius ** 2`.
  - `square` has a `side: number` — area is `side ** 2`.
  - `rectangle` has `width: number` and `height: number` — area is `width *
    height`.

  Use a switch on `shape.kind` and let the compiler narrow the variant. The
  grader compares the result rounded to 4 decimal places — so multiply by
  `10000`, `Math.round`, divide by `10000` before returning.
