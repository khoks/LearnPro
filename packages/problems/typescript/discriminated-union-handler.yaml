reference_solution: |
  type Shape =
      | { kind: "circle"; radius: number }
      | { kind: "square"; side: number }
      | { kind: "rectangle"; width: number; height: number };

  function solve(shape: Shape): number {
      let area = 0;
      switch (shape.kind) {
          case "circle":
              area = Math.PI * shape.radius * shape.radius;
              break;
          case "square":
              area = shape.side * shape.side;
              break;
          case "rectangle":
              area = shape.width * shape.height;
              break;
      }
      return Math.round(area * 10000) / 10000;
  }
public_examples:
  - input: { "kind": "square", "side": 4 }
    expected: 16
  - input: { "kind": "rectangle", "width": 3, "height": 5 }
    expected: 15
