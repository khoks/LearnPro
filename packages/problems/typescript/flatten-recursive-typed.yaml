slug: flatten-recursive-typed
name: Recursively flatten a nested array
language: typescript
difficulty: 4
track: typescript-fundamentals
concept_tags:
  - recursion
  - arrays
  - narrowing
expected_median_time_to_solve_ms: 360000
statement: |
  Write `solve(items: NestedNumberArray): number[]` that recursively
  flattens an arbitrarily-nested array of numbers into a single flat
  array. Order must be preserved.

  `NestedNumberArray` is defined as `(number | NestedNumberArray)[]`.
starter_code: |
  type NestedNumberArray = (number | NestedNumberArray)[];

  function solve(items: NestedNumberArray): number[] {
      // TODO
      return [];
  }
reference_solution: |
  type NestedNumberArray = (number | NestedNumberArray)[];

  function solve(items: NestedNumberArray): number[] {
      const out: number[] = [];
      for (const item of items) {
          if (Array.isArray(item)) {
              for (const x of solve(item)) out.push(x);
          } else {
              out.push(item);
          }
      }
      return out;
  }
public_examples:
  - input: [[1, [2, [3, 4]], 5]]
    expected: [1, 2, 3, 4, 5]
  - input: [[]]
    expected: []
hidden_tests:
  - input: [[1, 2, 3]]
    expected: [1, 2, 3]
  - input: [[[[1]]]]
    expected: [1]
  - input: [[1, [], 2]]
    expected: [1, 2]
  - input: [[[1, 2], [3, 4]]]
    expected: [1, 2, 3, 4]
  - input: [[0, [-1, [-2, [-3]]]]]
    expected: [0, -1, -2, -3]
  - input: [[[]]]
    expected: []
