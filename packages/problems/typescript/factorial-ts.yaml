slug: factorial-ts
name: Factorial (TypeScript)
language: typescript
difficulty: 2
track: typescript-fundamentals
concept_tags:
  - recursion
  - control-flow
  - numbers
expected_median_time_to_solve_ms: 90000
statement: |
  Write `solve(n: number): number` that returns `n!` for non-negative
  integer `n`. By convention `0! = 1`. You may assume `n <= 12` so the
  result fits comfortably in a 32-bit integer.
starter_code: |
  function solve(n: number): number {
      // TODO
      return 0;
  }
reference_solution: |
  function solve(n: number): number {
      let result = 1;
      for (let i = 2; i <= n; i++) result *= i;
      return result;
  }
public_examples:
  - input: 5
    expected: 120
  - input: 0
    expected: 1
