expected_median_time_to_solve_ms: 480000
statement: |
  Implement a `BankAccount` class with these operations and then expose
  `solve(operations)` that processes a list of `[op, amount]` pairs
  sequentially and returns the final balance.

  The class must support:
  - `deposit(amount: number)` — `amount` must be > 0; throw `Error` otherwise.
  - `withdraw(amount: number)` — `amount` must be > 0 and `<= balance`;
    throw `Error` otherwise.
  - `balance` getter — current balance, starting at 0.

  In `solve`, ignore any operation whose call throws and continue.

  Operations format: `["deposit", n]`, `["withdraw", n]`.
starter_code: |
