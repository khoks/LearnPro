reference_solution: |
  class BankAccount {
      private _balance = 0;
      get balance(): number {
          return this._balance;
      }
      deposit(amount: number): void {
          if (amount <= 0) throw new Error("amount must be positive");
          this._balance += amount;
      }
      withdraw(amount: number): void {
          if (amount <= 0 || amount > this._balance) {
              throw new Error("invalid withdrawal");
          }
          this._balance -= amount;
      }
  }

  function solve(operations: [string, number][]): number {
      const acct = new BankAccount();
      for (const [name, amount] of operations) {
          try {
              if (name === "deposit") acct.deposit(amount);
              else if (name === "withdraw") acct.withdraw(amount);
          } catch {
              // ignore invalid op
          }
      }
      return acct.balance;
  }
public_examples:
  - input: [[["deposit", 100], ["withdraw", 30]]]
    expected: 70
  - input: [[["deposit", 50], ["withdraw", 100]]]
    expected: 50
hidden_tests:
