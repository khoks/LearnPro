slug: debug-binary-search-off-by-one
name: Debug — binary search bound (off-by-one)
language: python
difficulty: 3
track: python-fundamentals
kind: debug
bug_archetype: off_by_one
concept_tags:
  - binary-search
  - control-flow
expected_median_time_to_solve_ms: 240000
expected_behavior: |
  Return the index of `target` in the sorted list `arr`, or -1 if not present.
  Uses standard half-open binary search. Must terminate for empty input and
  for targets at either boundary.
statement: |
  This binary-search SHOULD return the target's index (or -1), but the
  loop boundary is off by one and a few cases either return -1 incorrectly or
  raise IndexError. Find and fix the bug.
starter_code: |
  def solve(arr, target):
      lo, hi = 0, len(arr)
      while lo < hi - 1:
          mid = (lo + hi) // 2
          if arr[mid] == target:
              return mid
          if arr[mid] < target:
              lo = mid + 1
          else:
              hi = mid
      return -1
reference_solution: |
  def solve(arr, target):
      lo, hi = 0, len(arr)
      while lo < hi:
          mid = (lo + hi) // 2
          if arr[mid] == target:
              return mid
          if arr[mid] < target:
              lo = mid + 1
          else:
              hi = mid
      return -1
public_examples:
  - input: [[1, 2, 3, 4, 5], 3]
    expected: 2
  - input: [[1, 2, 3], 5]
    expected: -1
hidden_tests:
  - input: [[], 1]
    expected: -1
  - input: [[1], 1]
    expected: 0
  - input: [[1], 2]
    expected: -1
  - input: [[1, 3, 5, 7, 9], 1]
    expected: 0
  - input: [[1, 3, 5, 7, 9], 9]
    expected: 4
  - input: [[1, 3, 5, 7, 9], 4]
    expected: -1
