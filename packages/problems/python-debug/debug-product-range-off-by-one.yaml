slug: debug-product-range-off-by-one
name: Debug — product 1 to n (off-by-one)
language: python
difficulty: 2
track: python-fundamentals
kind: debug
bug_archetype: off_by_one
concept_tags:
  - control-flow
  - numbers
expected_median_time_to_solve_ms: 120000
expected_behavior: |
  Return the product of integers from 1 through n (inclusive). For n = 5 the
  answer is 120 (1*2*3*4*5). For n = 0 return 1 (empty product convention).
statement: |
  This SHOULD return the product of 1..n (inclusive). The loop bound is off
  by one and consistently undercounts by one factor. Find and fix the bug.
starter_code: |
  def solve(n):
      product = 1
      for i in range(1, n):
          product *= i
      return product
reference_solution: |
  def solve(n):
      product = 1
      for i in range(1, n + 1):
          product *= i
      return product
public_examples:
  - input: 5
    expected: 120
  - input: 0
    expected: 1
hidden_tests:
  - input: 1
    expected: 1
  - input: 2
    expected: 2
  - input: 3
    expected: 6
  - input: 4
    expected: 24
  - input: 6
    expected: 720
