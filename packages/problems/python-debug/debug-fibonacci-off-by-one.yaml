slug: debug-fibonacci-off-by-one
name: Debug — fibonacci index (off-by-one)
language: python
difficulty: 2
track: python-fundamentals
kind: debug
bug_archetype: off_by_one
concept_tags:
  - control-flow
  - numbers
expected_median_time_to_solve_ms: 150000
expected_behavior: |
  Return the n-th Fibonacci number, with F(0) = 0 and F(1) = 1. So F(2) = 1,
  F(3) = 2, F(10) = 55. Iterative approach is fine for n up to 30.
statement: |
  This iterative Fibonacci SHOULD return F(n) for n >= 0, but the loop
  iterates one too many times and the answers are off by one Fibonacci step.
  Find and fix the bug.
starter_code: |
  def solve(n):
      a, b = 0, 1
      for _ in range(n + 1):
          a, b = b, a + b
      return a
reference_solution: |
  def solve(n):
      a, b = 0, 1
      for _ in range(n):
          a, b = b, a + b
      return a
public_examples:
  - input: 0
    expected: 0
  - input: 5
    expected: 5
hidden_tests:
  - input: 1
    expected: 1
  - input: 2
    expected: 1
  - input: 3
    expected: 2
  - input: 10
    expected: 55
  - input: 15
    expected: 610
