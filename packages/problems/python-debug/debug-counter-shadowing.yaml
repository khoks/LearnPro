slug: debug-counter-shadowing
name: Debug — counter shadowing builtin
language: python
difficulty: 2
track: python-fundamentals
kind: debug
bug_archetype: shadowing
concept_tags:
  - functions
  - control-flow
  - lists
expected_median_time_to_solve_ms: 180000
expected_behavior: |
  Return how many times `target` appears in the list `items`. The function
  must use `items.count(target)` directly without shadowing built-in names.
statement: |
  This SHOULD count occurrences of `target` in `items` using the list's
  built-in `.count()` method. The local variable `count` is a list, which
  shadows the intent of calling `items.count(target)` and the final reference
  raises TypeError. Find and fix the bug.
starter_code: |
  def solve(items, target):
      count = []
      for x in items:
          if x == target:
              count.append(x)
      return count(items)
reference_solution: |
  def solve(items, target):
      return items.count(target)
public_examples:
  - input: [[1, 2, 3, 2, 1], 2]
    expected: 2
  - input: [[1, 1, 1], 1]
    expected: 3
hidden_tests:
  - input: [[], 5]
    expected: 0
  - input: [[1, 2, 3], 4]
    expected: 0
  - input: [[1], 1]
    expected: 1
  - input: [[1, 2, 1, 2, 1], 1]
    expected: 3
  - input: [["a", "b", "a"], "a"]
    expected: 2
