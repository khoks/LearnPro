slug: trace-array-from-set
name: Trace — dedupe with Set
language: typescript
difficulty: 2
track: typescript-fundamentals
kind: comprehension
comprehension_format: trace_execution
concept_tags:
  - sets
  - arrays
  - iteration
expected_median_time_to_solve_ms: 30000
statement: |
  Trace and report the result. Recall that Set preserves insertion order
  on iteration.
starter_code: |
  const out = Array.from(new Set([3, 1, 2, 1, 3, 4]));
  console.log(out);
question: What does the program log?
answer_format: multiple_choice
multiple_choice_options:
  - "[1, 2, 3, 4]"
  - "[3, 1, 2, 4]"
  - "[3, 1, 2, 1, 3, 4]"
  - "[4, 3, 2, 1]"
correct_answer_index: 1
explanation: |
  Set keeps the first occurrence of each value and discards later
  duplicates. Iteration order is insertion order, so the result is
  [3, 1, 2, 4] — not sorted, but deduplicated.
