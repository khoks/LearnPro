statement: |
  What is the worst-case time complexity of this function in terms of n = len(arr)?
starter_code: |
  def has_duplicate(arr):
      for i in range(len(arr)):
          for j in range(i + 1, len(arr)):
              if arr[i] == arr[j]:
                  return True
      return False
question: What is the worst-case time complexity in terms of n = len(arr)?
answer_format: multiple_choice
multiple_choice_options:
  - "O(n)"
  - "O(n log n)"
  - "O(n^2)"
  - "O(n^3)"
correct_answer_index: 2
explanation: |
  The outer loop runs n times; the inner loop runs up to n - i - 1 times.
  The total number of comparisons is n*(n-1)/2, which is O(n^2). A hash-set
  approach can do this in O(n) average.
