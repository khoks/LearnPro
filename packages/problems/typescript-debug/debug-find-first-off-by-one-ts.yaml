slug: debug-find-first-off-by-one-ts
name: Debug — find first occurrence (off-by-one) (TypeScript)
language: typescript
difficulty: 1
track: typescript-fundamentals
kind: debug
bug_archetype: off_by_one
concept_tags:
  - arrays
  - control-flow
expected_median_time_to_solve_ms: 120000
expected_behavior: |
  Return the index of the first occurrence of `target` in `arr`, or -1 if it is
  absent. For [1,2,3] and target 2 the answer is 1.
statement: |
  This SHOULD return the index of the first occurrence (or -1). It returns
  i + 1 instead of i — find and fix the bug.
starter_code: |
  function solve(arr: number[], target: number): number {
      for (let i = 0; i < arr.length; i++) {
          if (arr[i] === target) return i + 1;
      }
      return -1;
  }
reference_solution: |
  function solve(arr: number[], target: number): number {
      for (let i = 0; i < arr.length; i++) {
          if (arr[i] === target) return i;
      }
      return -1;
  }
public_examples:
  - input: [[1, 2, 3], 2]
    expected: 1
  - input: [[1, 2, 3], 4]
    expected: -1
hidden_tests:
  - input: [[], 1]
    expected: -1
  - input: [[5], 5]
    expected: 0
  - input: [[1, 2, 3], 1]
    expected: 0
  - input: [[1, 2, 3], 3]
    expected: 2
  - input: [[2, 2, 2], 2]
    expected: 0
