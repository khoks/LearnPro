slug: debug-dedupe-mutation-iteration-ts
name: Debug — dedupe array (mutation in iteration) (TypeScript)
language: typescript
difficulty: 3
track: typescript-fundamentals
kind: debug
bug_archetype: mutation_in_iteration
concept_tags:
  - arrays
  - control-flow
  - sets
expected_median_time_to_solve_ms: 210000
expected_behavior: |
  Return an array of `nums` with duplicates removed, preserving the order of
  first occurrence. Do not mutate the caller's array.
statement: |
  This SHOULD return a deduplicated array. Splicing while iterating skips an
  element after each removal so duplicates remain. Find and fix the bug.
starter_code: |
  function solve(nums: number[]): number[] {
      const seen = new Set<number>();
      for (let i = 0; i < nums.length; i++) {
          if (seen.has(nums[i])) {
              nums.splice(i, 1);
          } else {
              seen.add(nums[i]);
          }
      }
      return nums;
  }
reference_solution: |
  function solve(nums: number[]): number[] {
      const seen = new Set<number>();
      const out: number[] = [];
      for (const x of nums) {
          if (!seen.has(x)) {
              seen.add(x);
              out.push(x);
          }
      }
      return out;
  }
public_examples:
  - input: [[1, 2, 1, 3, 2]]
    expected: [1, 2, 3]
  - input: [[1, 1, 1]]
    expected: [1]
hidden_tests:
  - input: [[]]
    expected: []
  - input: [[5]]
    expected: [5]
  - input: [[1, 2, 3]]
    expected: [1, 2, 3]
  - input: [[1, 2, 2, 3, 3, 3]]
    expected: [1, 2, 3]
  - input: [[3, 1, 2, 1, 3, 2]]
    expected: [3, 1, 2]
