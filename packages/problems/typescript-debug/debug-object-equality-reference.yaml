slug: debug-object-equality-reference
name: Debug — object equality (reference)
language: typescript
difficulty: 3
track: typescript-fundamentals
kind: debug
bug_archetype: reference_equality
concept_tags:
  - records
  - equality
expected_median_time_to_solve_ms: 210000
expected_behavior: |
  Return true when objects `a` and `b` have the same string keys mapped to the
  same primitive values; false otherwise. Two distinct objects with identical
  shape must compare equal.
statement: |
  This SHOULD shallow-compare two objects' keys and values. Using `===` between
  objects compares references, so two equal objects return false. Find and fix
  the bug.
starter_code: |
  function solve(a: Record<string, unknown>, b: Record<string, unknown>): boolean {
      return a === b;
  }
reference_solution: |
  function solve(a: Record<string, unknown>, b: Record<string, unknown>): boolean {
      const keysA = Object.keys(a);
      const keysB = Object.keys(b);
      if (keysA.length !== keysB.length) return false;
      for (const k of keysA) {
          if (a[k] !== b[k]) return false;
      }
      return true;
  }
public_examples:
  - input: [{ x: 1 }, { x: 1 }]
    expected: true
  - input: [{ x: 1 }, { x: 2 }]
    expected: false
hidden_tests:
  - input: [{}, {}]
    expected: true
  - input: [{ a: 1, b: 2 }, { a: 1, b: 2 }]
    expected: true
  - input: [{ a: 1 }, { a: 1, b: 2 }]
    expected: false
  - input: [{ k: "x" }, { k: "x" }]
    expected: true
  - input: [{ a: 1, b: 2 }, { a: 2, b: 1 }]
    expected: false
