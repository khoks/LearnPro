slug: debug-cents-coercion-ts
name: Debug — cents to dollars string (type coercion) (TypeScript)
language: typescript
difficulty: 2
track: typescript-fundamentals
kind: debug
bug_archetype: type_coercion
concept_tags:
  - numbers
  - strings
expected_median_time_to_solve_ms: 150000
expected_behavior: |
  Given an integer number of cents, return a string like "$1.25". Always two
  decimal places, no thousands separator. solve(0) returns "$0.00".
statement: |
  This SHOULD format `cents` as a dollar string. The remainder loses its
  leading zero (1 cent renders as "$0.1" instead of "$0.01"). Find and fix
  the bug.
starter_code: |
  function solve(cents: number): string {
      const dollars = Math.floor(cents / 100);
      const remainder = cents % 100;
      return "$" + dollars + "." + remainder;
  }
reference_solution: |
  function solve(cents: number): string {
      const dollars = Math.floor(cents / 100);
      const remainder = cents % 100;
      return `$${dollars}.${remainder.toString().padStart(2, "0")}`;
  }
public_examples:
  - input: 125
    expected: "$1.25"
  - input: 0
    expected: "$0.00"
hidden_tests:
  - input: 100
    expected: "$1.00"
  - input: 1
    expected: "$0.01"
  - input: 99
    expected: "$0.99"
  - input: 1000
    expected: "$10.00"
  - input: 12345
    expected: "$123.45"
