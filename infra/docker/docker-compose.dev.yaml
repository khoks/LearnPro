# LearnPro local dev stack.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yaml up -d
#   docker compose -f infra/docker/docker-compose.dev.yaml down
#   docker compose -f infra/docker/docker-compose.dev.yaml logs -f <service>
#
# Services:
#   postgres   — Postgres 16 + pgvector. Connection: postgresql://learnpro:learnpro@localhost:5432/learnpro
#   redis      — Redis 7. Connection: redis://localhost:6379
#   minio      — S3-compatible object store. Console: http://localhost:9001 (minioadmin / minioadmin)
#   piston     — Self-hosted code execution sandbox. API: http://localhost:2000
#
# Hard rules (per ADR-0002 / EPIC-016):
#   - No `--privileged` anywhere.
#   - Sandbox containers are isolated; the dev stack is for local convenience only.

name: learnpro-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnpro-postgres
    environment:
      POSTGRES_USER: learnpro
      POSTGRES_PASSWORD: learnpro
      POSTGRES_DB: learnpro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnpro -d learnpro"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learnpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: learnpro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: learnpro-piston
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  piston-data:
