# LearnPro local dev stack.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yaml up -d
#   docker compose -f infra/docker/docker-compose.dev.yaml down
#   docker compose -f infra/docker/docker-compose.dev.yaml logs -f <service>
#
# Services:
#   postgres   — Postgres 16 + pgvector. Connection: postgresql://learnpro:learnpro@localhost:5432/learnpro
#   redis      — Redis 7. Connection: redis://localhost:6379
#   minio      — S3-compatible object store. Console: http://localhost:9001 (minioadmin / minioadmin)
#   piston     — Self-hosted code execution sandbox. API: http://localhost:2000
#
# Hard rules (per ADR-0002 / EPIC-016):
#   - No `--privileged` anywhere.
#   - Sandbox containers are isolated; the dev stack is for local convenience only.

name: learnpro-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnpro-postgres
    environment:
      POSTGRES_USER: learnpro
      POSTGRES_PASSWORD: learnpro
      POSTGRES_DB: learnpro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnpro -d learnpro"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learnpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: learnpro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  piston:
    # Hardening posture per ADR-0002 / STORY-010. Piston *itself* needs network + a writable
    # /piston volume for installed language packages, so we cannot drop those — but every other
    # hardening lever is pulled here as defense-in-depth for the host.
    #
    # Per-execution isolation (no-net for the user program, ro rootfs, cgroup CPU/mem/pids,
    # wall-clock kill, output cap, drop caps inside the run, non-root run-uid, seccomp on the
    # spawned process) is enforced by Piston *internally* on each /api/v2/execute. The breakout
    # suite in packages/sandbox/test/breakout/ verifies that enforcement against a live Piston
    # when LEARNPRO_REQUIRE_PISTON=1; otherwise it runs structurally against a stub provider.
    image: ghcr.io/engineer-man/piston
    container_name: learnpro-piston
    # Pin a non-root user inside the container. The Piston image creates a `piston` user; map to
    # 1000:1000 to ensure non-root regardless of upstream defaults.
    user: "1000:1000"
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston
    tmpfs:
      # tmpfs mounts vanish between container restarts (checklist item: tmpfs /tmp).
      - /tmp:rw,size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      # Equivalent to --security-opt=no-new-privileges:true. Together with cap_drop=ALL this
      # blocks setuid escalation inside the container.
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    cpus: 2.0
    # We deliberately do NOT pass --privileged anywhere — STORY-010 AC-4 grep enforces this.
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  piston-data:
